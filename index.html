<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF vs Markdown Comparison</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select {
            padding: 5px;
            font-size: 14px;
            max-width: 400px;
        }
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #ccc;
        }
        .pane-header {
            background: #f0f0f0;
            padding: 5px 10px;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #markdown-content {
            padding: 20px;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
            background: white;
        }
        #markdown-content img {
            max-width: 100%;
        }
        /* Markdown Styling */
        #markdown-content h1, #markdown-content h2, #markdown-content h3 {
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        #markdown-content pre {
            background: #f6f8fa;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
        #markdown-content table {
            border-collapse: collapse;
            width: 100%;
        }
        #markdown-content th, #markdown-content td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }
        #markdown-content tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
    </style>
</head>
<body>
    <header>
        <div><strong>Data Reclamation Viewer</strong></div>
        <div class="controls">
            <label for="file-selector">Select File:</label>
            <select id="file-selector">
                <option value="">Loading...</option>
            </select>
            <button id="prev-btn">Previous</button>
            <button id="next-btn">Next</button>
        </div>
    </header>
    <main>
        <div class="pane">
            <div class="pane-header">Original PDF</div>
            <iframe id="pdf-viewer"></iframe>
        </div>
        <div class="pane">
            <div class="pane-header">Extracted Markdown</div>
            <div id="markdown-content"></div>
        </div>
    </main>

    <script>
        const selector = document.getElementById('file-selector');
        const pdfViewer = document.getElementById('pdf-viewer');
        const mdContent = document.getElementById('markdown-content');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let manifest = [];

        async function loadManifest() {
            try {
                const response = await fetch('manifest.json');
                manifest = await response.json();
                
                selector.innerHTML = '';
                manifest.forEach((item, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = item.name;
                    selector.appendChild(option);
                });

                if (manifest.length > 0) {
                    loadFile(0);
                }
            } catch (error) {
                console.error('Error loading manifest:', error);
                mdContent.innerHTML = '<p style="color:red">Error loading manifest.json. Make sure it exists and is valid.</p>';
            }
        }

        async function loadFile(index) {
            const item = manifest[index];
            if (!item) return;

            selector.value = index;
            
            // Load PDF
            pdfViewer.src = item.pdf;

            // Load Markdown
            try {
                const response = await fetch(item.md);
                const text = await response.text();
                mdContent.innerHTML = marked.parse(text);
                mdContent.scrollTop = 0;
            } catch (error) {
                console.error('Error loading markdown:', error);
                mdContent.innerHTML = '<p style="color:red">Error loading markdown file.</p>';
            }

            // Update URL hash without jumping
            history.replaceState(null, null, `#${index}`);
        }

        selector.addEventListener('change', (e) => {
            loadFile(e.target.value);
        });

        prevBtn.addEventListener('click', () => {
            let index = parseInt(selector.value) - 1;
            if (index >= 0) loadFile(index);
        });

        nextBtn.addEventListener('click', () => {
            let index = parseInt(selector.value) + 1;
            if (index < manifest.length) loadFile(index);
        });

        // Handle URL hash for deep linking
        window.addEventListener('load', () => {
            loadManifest().then(() => {
                const hash = window.location.hash.substring(1);
                if (hash && !isNaN(hash)) {
                    const index = parseInt(hash);
                    if (index >= 0 && index < manifest.length) {
                        loadFile(index);
                    }
                }
            });
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevBtn.click();
            if (e.key === 'ArrowRight') nextBtn.click();
        });
    </script>
</body>
</html>
